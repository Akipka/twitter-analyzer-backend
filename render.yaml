services:
  - type: web
    name: twitter-report-card-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT --workers 1 --timeout 60
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: TWITTERAPI_IO_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: MAX_TWEETS
        value: "30"
