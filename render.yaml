services:
  - type: web
    name: gradebook-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --chdir . --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.6"
      - key: CORS_ORIGINS
        # Replace YOUR_VERCEL_URL with your actual Vercel URL after frontend deploy
        sync: false
    healthCheckPath: /health
